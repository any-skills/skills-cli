name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build all platforms
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            OUT="skills-cli-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then OUT="${OUT}.exe"; fi
            echo "Building $OUT ($VERSION)"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath \
              -ldflags="-s -w -X github.com/rushteam/skills-cli/cmd.Version=${VERSION}" \
              -o "dist/${OUT}" .
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
